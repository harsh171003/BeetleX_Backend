version: '3.9'

services:
  postgres:
    image: postgres:15

    container_name: beetlex-postgres

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: beetlex

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .

    container_name: beetlex-backend

    depends_on:
      - postgres

    ports:
      - "3000:3000"

    env_file:
      - .env

volumes:
  postgres_data: